name: rule-proofs

# Empirically prove each rule's lock/rewrite claim against real Postgres, per version.
# Docker/DB-heavy, so deliberately NOT part of the per-PR gate: manual + weekly only.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  prove:
    name: prove (pg ${{ matrix.pg }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: ['14', '15', '16', '17', '18']
    services:
      postgres:
        image: postgres:${{ matrix.pg }}
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # pg_query compiles vendored libpg_query (C) via bindgen, which needs libclang.
      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Prove rules
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: cargo test --test rule_proofs -- --ignored --nocapture
