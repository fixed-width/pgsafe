name: rule-proofs

# Empirically prove each rule's lock/rewrite claim against real Postgres, per version.
# Docker/DB-heavy, so deliberately NOT part of the per-PR gate: manual + weekly only.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  prove:
    name: prove (pg ${{ matrix.pg }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: ['14', '15', '16', '17', '18']
    services:
      postgres:
        image: postgres:${{ matrix.pg }}
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      # pg_query compiles vendored libpg_query (C) via bindgen, which needs libclang.
      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Prove rules
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: cargo test --test rule_proofs -- --ignored --nocapture
