name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  # upload-rust-binary-action uploads assets to an EXISTING release; it does not create one. This
  # job creates a DRAFT release for the tag, the matrix below uploads assets to it, and the publish
  # job flips it live last — so the release is only published once every asset is attached. This is
  # required for immutable releases: once a release is published its tag and assets are frozen, so
  # assets cannot be added afterwards. A draft keeps the tag unlocked until publish, so a failed
  # build simply leaves an unpublished draft and the tag can be reused on a re-run.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: taiki-e/create-gh-release-action@eba8ea96c86cca8a37f1b56e94b4d13301fba651 # v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true

  upload:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write      # upload-rust-binary-action attaches assets to the release
      id-token: write      # Sigstore OIDC token for build-provenance signing
      attestations: write  # write the provenance to the attestation API
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # pg_query compiles vendored libpg_query (C) via bindgen, which needs libclang;
      # the musl target also needs a musl C toolchain.
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y libclang-dev musl-tools clang
          echo "CC_x86_64_unknown_linux_musl=musl-gcc" >> "$GITHUB_ENV"
          echo "BINDGEN_EXTRA_CLANG_ARGS=-I$(clang --print-resource-dir)/include" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1
        with:
          bin: pgsafe
          # Ship the language server in released binaries so `pgsafe lsp` works out of the
          # box; a from-source `cargo install pgsafe` still needs `--features lsp`.
          features: lsp
          target: ${{ matrix.target }}
          archive: pgsafe-$target
          checksum: sha256
          include: LICENSE
          locked: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: pgsafe-${{ matrix.target }}.tar.gz

  # Flip the draft live only after every matrix upload succeeded, so the published release carries
  # all assets atomically. With release immutability enabled this is the point the tag locks and the
  # assets freeze; if any upload job failed, this job is skipped and the draft stays unpublished.
  publish:
    needs: upload
    runs-on: ubuntu-latest
    steps:
      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --draft=false

  # Publish the crate to crates.io once the GitHub release is live, so a tag yields one aligned set of
  # artifacts: git tag = GitHub release (binaries) = crates.io version. Requires a CARGO_REGISTRY_TOKEN
  # repo secret (Settings -> Secrets and variables -> Actions) scoped to publish-update. The gate makes
  # the job re-runnable: crates.io versions are immutable, so if the version is already up (e.g. a
  # re-run after a flaky binary upload) it skips instead of hard-failing, and it refuses to publish if
  # the tag and Cargo.toml version disagree.
  cargo-publish:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # pg_query compiles vendored libpg_query (C) via bindgen, which needs libclang for cargo
      # publish's verify build.
      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Gate on tag/version agreement and not-already-published
        id: gate
        run: |
          set -euo pipefail
          tag_ver="${GITHUB_REF_NAME#v}"
          manifest_ver="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="pgsafe") | .version')"
          if [ "$tag_ver" != "$manifest_ver" ]; then
            echo "::error::tag v$tag_ver does not match Cargo.toml version $manifest_ver"
            exit 1
          fi
          if curl -sf -H 'User-Agent: pgsafe-release-ci (github actions)' \
              "https://crates.io/api/v1/crates/pgsafe/$tag_ver" >/dev/null; then
            echo "pgsafe $tag_ver is already on crates.io; skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: cargo publish
        if: steps.gate.outputs.skip == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
