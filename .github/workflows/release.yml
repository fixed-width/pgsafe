name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  # upload-rust-binary-action uploads assets to an EXISTING release; it does not create one.
  # This job creates the GitHub release for the tag first; the matrix below then uploads to it.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v5

      # pg_query compiles vendored libpg_query (C) via bindgen, which needs libclang;
      # the musl target also needs a musl C toolchain.
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y libclang-dev musl-tools clang
          echo "CC_x86_64_unknown_linux_musl=musl-gcc" >> "$GITHUB_ENV"
          echo "BINDGEN_EXTRA_CLANG_ARGS=-I$(clang --print-resource-dir)/include" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable

      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: pgsafe
          target: ${{ matrix.target }}
          archive: pgsafe-$target
          checksum: sha256
          include: LICENSE
          locked: true
          token: ${{ secrets.GITHUB_TOKEN }}
